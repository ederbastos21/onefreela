http:
  method: POST
  url: http://localhost:8080/cart/addItem
  headers:
    - name: Authorization
      value: a
  body:
    type: json
    data: |-
      {
        "WorkId" : "1",
        "amount" : "5"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
