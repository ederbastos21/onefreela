services:
  db:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: 12345
      MYSQL_DATABASE: onefreeladb
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  app:
    image: eclipse-temurin:21
    working_dir: /app
    volumes:
      - .:/app
    command: ./mvnw spring-boot:run
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  db_data: