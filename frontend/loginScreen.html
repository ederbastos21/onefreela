<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OneFreela — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="bg"></div>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="cursor-glow" id="cursorGlow"></div>

  <!-- Floating decorative text -->
  <div class="float-tag">ONEFREELA</div>
  <div class="float-tag">FREELANCER</div>
  <div class="float-tag">CONECTE-SE</div>

  <div class="scene">
    <div class="card" id="card">

      <!-- Logo -->
      <div class="logo-wrap draggable" id="logo">
        <div class="logo-icon">OF</div>
        <div class="logo-text">One<span>Freela</span></div>
      </div>

      <!-- Heading -->
      <div class="heading draggable" id="heading">BEM-VINDO<br>DE VOLTA!</div>

      <!-- Subtitle -->
      <p class="subtitle draggable" id="subtitle">
        Não tem uma conta? <a href="signupScreen.html">Crie uma agora!</a>
      </p>

      <!-- Email -->
      <div class="field">
        <div class="label-row"><label for="email">E-mail</label></div>
        <div class="input-wrap">
          <input type="email" id="email" placeholder="seu@email.com" autocomplete="off" />
        </div>
      </div>

      <!-- Password -->
      <div class="field">
        <div class="label-row">
          <label for="senha">Senha</label>
          <a href="forgotPassword.html" class="forgot">Esqueceu a senha?</a>
        </div>
        <div class="input-wrap">
          <input type="password" id="senha" placeholder="••••••••" />
          <button class="eye-btn" id="eyeBtn" type="button" aria-label="Mostrar senha">
            <svg id="eyeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Toggle -->
      <div class="toggle-row">
        <div class="toggle" id="toggle"></div>
        <span>Manter-me conectado</span>
      </div>

      <!-- Tipo de usuário -->
      <div class="login-type-wrap">
        <div class="login-type-label">Entrar como</div>
        <div class="login-type-toggle">
          <div id="typePill" class="login-type-pill"></div>
          <button id="btnCliente" class="login-type-btn active" onclick="setUserType('cliente')">CLIENTE</button>
          <button id="btnFreelancer" class="login-type-btn" onclick="setUserType('freelancer')">FREELANCER</button>
        </div>
      </div>

      <!-- Button -->
      <div id="formMsg" class="form-msg"></div>
      <button class="btn draggable" id="loginBtn" onclick="handleLogin()">ENTRAR</button>

      <!-- Drag hint -->
      <p class="drag-hint">✦ ARRASTE OS ELEMENTOS ACIMA ✦</p>

    </div>
  </div>

  <script src="main.js"></script>
  <script src="loginScreen.js"></script>
</body>
</html>
