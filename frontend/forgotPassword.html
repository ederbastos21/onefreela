<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OneFreela — Esqueceu a senha?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    :root {
      --black:  #080808;
      --card:   #161616;
      --input:  #1e1e1e;
      --border: #272727;
      --green:  #7fff00;
      --text:   #f0f0f0;
      --muted:  #777;
      --radius: 999px;
      --r-card: 20px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; font-family: 'Syne', sans-serif;
      background: var(--black); color: var(--text); overflow: hidden;
    }

    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 999; opacity: .3;
    }

    .bg {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 65% 70% at 15% 15%, #1e1e1e 0%, transparent 55%),
        radial-gradient(ellipse 55% 60% at 85% 85%, #141414 0%, transparent 55%),
        linear-gradient(170deg, #1a1a1a 0%, #080808 55%);
    }

    .bg::after {
      content: ''; position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.02) 1px, transparent 1px);
      background-size: 55px 55px;
      mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black 20%, transparent 75%);
    }

    .blob {
      position: fixed; border-radius: 50%;
      filter: blur(100px); pointer-events: none; z-index: 1;
    }
    .blob-1 { width: 500px; height: 500px; top: -120px; left: -120px; background: rgba(127,255,0,.05); animation: drift 14s ease-in-out infinite alternate; }
    .blob-2 { width: 350px; height: 350px; bottom: -80px; right: -80px; background: rgba(127,255,0,.04); animation: drift 10s ease-in-out infinite alternate-reverse; }
    @keyframes drift { from{transform:translate(0,0)} to{transform:translate(30px,20px)} }

    .cursor-glow {
      position: fixed; width: 360px; height: 360px; border-radius: 50%;
      background: radial-gradient(circle, rgba(127,255,0,.055) 0%, transparent 70%);
      pointer-events: none; transform: translate(-50%,-50%);
      transition: left .1s, top .1s; z-index: 998;
    }

    .scene {
      position: relative; z-index: 10;
      height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px;
    }

    .back-link {
      position: fixed; top: 28px; left: 36px;
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; font-weight: 600; color: var(--muted);
      text-decoration: none;
      transition: color .2s;
      z-index: 20;
      animation: fadeDown .5s .1s both;
    }
    .back-link:hover { color: var(--green); }
    .back-link svg { transition: transform .2s; }
    .back-link:hover svg { transform: translateX(-3px); }

    .logo {
      display: flex; align-items: center; gap: 9px;
      text-decoration: none; color: var(--text);
      margin-bottom: 40px;
      animation: fadeDown .5s .15s both;
    }
    .logo-icon {
      width: 32px; height: 32px; background: var(--green);
      border-radius: 9px; display: flex; align-items: center; justify-content: center;
      font-family: 'Bebas Neue', sans-serif; font-size: 17px; color: #000;
    }
    .logo-text { font-family: 'Bebas Neue', sans-serif; font-size: 21px; letter-spacing: 2px; }
    .logo-text span { color: var(--green); }

    .card {
      width: 100%; max-width: 460px;
      background: linear-gradient(145deg, rgba(24,24,24,.97), rgba(14,14,14,.97));
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 48px 52px;
      box-shadow: 0 0 0 1px rgba(255,255,255,.03), 0 32px 80px rgba(0,0,0,.7);
      backdrop-filter: blur(12px);
      position: relative; overflow: hidden;
    }
    .card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--green), transparent);
      opacity: .5;
    }

    .step { animation: stepIn .45s cubic-bezier(.22,.68,0,1.2) both; }
    @keyframes stepIn  { from{opacity:0;transform:translateX(28px)} to{opacity:1;transform:translateX(0)} }
    @keyframes stepOut { from{opacity:1;transform:translateX(0)} to{opacity:0;transform:translateX(-28px)} }
    .step.leaving { animation: stepOut .3s ease forwards; }

    .step-icon {
      width: 64px; height: 64px; border-radius: 18px;
      background: rgba(127,255,0,.1);
      border: 1px solid rgba(127,255,0,.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; margin-bottom: 24px;
    }

    .step-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 42px; letter-spacing: 1px; line-height: .95;
      margin-bottom: 10px;
    }
    .step-title .green { color: var(--green); }

    .step-desc {
      font-size: 13px; color: var(--muted); line-height: 1.75;
      margin-bottom: 32px;
    }
    .step-desc strong { color: var(--text); }

    .progress {
      display: flex; gap: 7px; margin-bottom: 32px;
    }
    .dot {
      height: 3px; border-radius: 3px;
      background: var(--border);
      transition: width .4s ease, background .4s ease;
    }
    .dot.active { background: var(--green); }
    .dot-1 { width: 32px; }
    .dot-2 { width: 16px; }
    .dot-3 { width: 16px; }

    .field { margin-bottom: 20px; }
    label {
      display: block;
      font-size: 11px; font-weight: 700;
      letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 8px;
    }
    .input-wrap { position: relative; }
    input[type="email"],
    input[type="text"] {
      width: 100%;
      background: var(--input);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 15px 16px;
      font-family: 'Syne', sans-serif; font-size: 14px; color: var(--text);
      outline: none;
      transition: border-color .25s, box-shadow .25s;
    }
    input::placeholder { color: #3a3a3a; }
    input:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(127,255,0,.1);
    }
    input.error { border-color: #ef4444; box-shadow: 0 0 0 3px rgba(239,68,68,.1); }
    .error-msg {
      font-size: 11px; color: #ef4444; margin-top: 6px;
      display: none;
    }
    .error-msg.show { display: block; }

    .otp-wrap {
      display: flex; gap: 10px; justify-content: space-between;
      margin-bottom: 20px;
    }
    .otp-input {
      flex: 1;
      background: var(--input) !important;
      border: 1px solid var(--border) !important;
      border-radius: 12px !important;
      padding: 16px 0 !important;
      text-align: center;
      font-family: 'Bebas Neue', sans-serif !important;
      font-size: 24px !important; letter-spacing: 2px;
      color: var(--text) !important;
      outline: none;
      transition: border-color .25s, box-shadow .25s;
      caret-color: var(--green);
    }
    .otp-input:focus {
      border-color: var(--green) !important;
      box-shadow: 0 0 0 3px rgba(127,255,0,.1) !important;
    }
    .otp-input.filled { border-color: rgba(127,255,0,.35) !important; color: var(--green) !important; }

    .resend-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px;
    }
    .resend-text { font-size: 12px; color: var(--muted); }
    .resend-btn {
      font-size: 12px; font-weight: 700; color: var(--green);
      background: none; border: none; cursor: pointer;
      transition: opacity .2s;
    }
    .resend-btn:disabled { opacity: .4; cursor: default; }
    .timer { font-size: 12px; color: var(--muted); }

    input[type="password"] {
      width: 100%;
      background: var(--input);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 15px 46px 15px 16px;
      font-family: 'Syne', sans-serif; font-size: 14px; color: var(--text);
      outline: none;
      transition: border-color .25s, box-shadow .25s;
    }
    input[type="password"]:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(127,255,0,.1);
    }
    .eye-btn {
      position: absolute; right: 14px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--muted); display: flex; transition: color .2s;
    }
    .eye-btn:hover { color: var(--green); }

    .strength-bar { height: 3px; border-radius: 3px; background: var(--border); margin-top: 7px; overflow: hidden; }
    .strength-fill { height: 100%; width: 0; border-radius: 3px; transition: width .4s, background .4s; }
    .strength-label { font-size: 10px; color: var(--muted); margin-top: 4px; }

    .btn {
      width: 100%; padding: 17px;
      background: var(--green); color: #000;
      border: none; border-radius: var(--radius);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px; letter-spacing: 3px;
      cursor: pointer; position: relative; overflow: hidden;
      transition: transform .18s, box-shadow .18s;
      margin-top: 4px;
    }
    .btn::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.22), transparent);
      transform: translateX(-100%); transition: transform .5s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 32px rgba(127,255,0,.32); }
    .btn:hover::before { transform: translateX(100%); }
    .btn:active { transform: translateY(0); box-shadow: none; }
    .btn:disabled { opacity: .5; cursor: not-allowed; transform: none; box-shadow: none; }

    .success-icon {
      width: 72px; height: 72px; border-radius: 50%;
      background: rgba(127,255,0,.12);
      border: 1px solid rgba(127,255,0,.3);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 28px;
      animation: popIn .5s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes popIn { from{transform:scale(0);opacity:0} to{transform:scale(1);opacity:1} }
    .success-check {
      stroke-dasharray: 60;
      stroke-dashoffset: 60;
      animation: drawCheck .5s .2s ease forwards;
    }
    @keyframes drawCheck { to { stroke-dashoffset: 0; } }

    .success-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 42px; text-align: center; letter-spacing: 1px; line-height: 1;
      margin-bottom: 12px;
    }
    .success-title span { color: var(--green); }
    .success-desc { font-size: 13px; color: var(--muted); text-align: center; line-height: 1.75; margin-bottom: 32px; }

    .ripple {
      position: absolute; border-radius: 50%;
      background: rgba(0,0,0,.2);
      transform: scale(0);
      animation: rippleAnim .55s ease-out forwards;
      pointer-events: none;
    }
    @keyframes rippleAnim { to{transform:scale(4);opacity:0} }

    @keyframes fadeDown { from{opacity:0;transform:translateY(-12px)} to{opacity:1;transform:translateY(0)} }
  </style>
</head>
<body>

  <div class="bg"></div>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="cursor-glow" id="cursorGlow"></div>

  <a href="loginScreen.html" class="back-link">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg>
    Voltar ao login
  </a>

  <div class="scene">

    <a href="index.html" class="logo">
      <div class="logo-icon">OF</div>
      <div class="logo-text">One<span>Freela</span></div>
    </a>

    <div class="card" id="card">
      <div id="stepContainer"></div>
    </div>

  </div>

  <script>
    let currentStep = 1;
    let userEmail   = '';
    let timerInterval = null;

    document.addEventListener('mousemove', e => {
      document.getElementById('cursorGlow').style.left = e.clientX + 'px';
      document.getElementById('cursorGlow').style.top  = e.clientY + 'px';
    });

    function render(step) {
      const container = document.getElementById('stepContainer');

      if (step === 1) {
        container.innerHTML = `
          <div class="step" id="step">
            <div class="step-icon">📧</div>
            <div class="progress">
              <div class="dot dot-1 active"></div>
              <div class="dot dot-2"></div>
              <div class="dot dot-3"></div>
            </div>
            <h2 class="step-title">ESQUECEU<br>A <span class="green">SENHA?</span></h2>
            <p class="step-desc">Sem problemas. Digite seu e-mail cadastrado e enviaremos um código de verificação.</p>
            <div class="field">
              <label for="emailInput">E-mail cadastrado</label>
              <input type="email" id="emailInput" placeholder="seu@email.com" />
              <span class="error-msg" id="emailError">Por favor, insira um e-mail válido.</span>
            </div>
            <button class="btn" id="btnStep1" onclick="handleStep1(event)">ENVIAR CÓDIGO</button>
          </div>`;

        document.getElementById('emailInput').addEventListener('keydown', e => {
          if (e.key === 'Enter') handleStep1({ clientX: 0, clientY: 0 });
        });

      } else if (step === 2) {
        container.innerHTML = `
          <div class="step" id="step">
            <div class="step-icon">🔑</div>
            <div class="progress">
              <div class="dot dot-1 active"></div>
              <div class="dot dot-2 active"></div>
              <div class="dot dot-3"></div>
            </div>
            <h2 class="step-title">CÓDIGO DE<br><span class="green">VERIFICAÇÃO</span></h2>
            <p class="step-desc">Enviamos um código de 6 dígitos para <strong>${userEmail}</strong>. Verifique sua caixa de entrada.</p>
            <div class="otp-wrap" id="otpWrap">
              <input class="otp-input" maxlength="1" inputmode="numeric" />
              <input class="otp-input" maxlength="1" inputmode="numeric" />
              <input class="otp-input" maxlength="1" inputmode="numeric" />
              <input class="otp-input" maxlength="1" inputmode="numeric" />
              <input class="otp-input" maxlength="1" inputmode="numeric" />
              <input class="otp-input" maxlength="1" inputmode="numeric" />
            </div>
            <div class="resend-row">
              <span class="resend-text">Não recebeu?</span>
              <div style="display:flex;align-items:center;gap:8px">
                <button class="resend-btn" id="resendBtn" onclick="startTimer()" disabled>Reenviar</button>
                <span class="timer" id="timerDisplay">00:59</span>
              </div>
            </div>
            <button class="btn" id="btnStep2" onclick="handleStep2(event)">VERIFICAR CÓDIGO</button>
          </div>`;

        setupOTP();
        startTimer();

      } else if (step === 3) {
        container.innerHTML = `
          <div class="step" id="step">
            <div class="step-icon">🔒</div>
            <div class="progress">
              <div class="dot dot-1 active"></div>
              <div class="dot dot-2 active"></div>
              <div class="dot dot-3 active"></div>
            </div>
            <h2 class="step-title">NOVA<br><span class="green">SENHA</span></h2>
            <p class="step-desc">Escolha uma senha forte. Ela deve ter pelo menos 8 caracteres, com letras, números e símbolos.</p>
            <div class="field">
              <label>Nova senha</label>
              <div class="input-wrap">
                <input type="password" id="novaSenha" placeholder="Mínimo 8 caracteres" oninput="checkStrength(this.value)" />
                <button class="eye-btn" onclick="toggleEye('novaSenha','eyeIcon1')" type="button">
                  <svg id="eyeIcon1" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
              </div>
              <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
              <span class="strength-label" id="strengthLabel"></span>
            </div>
            <div class="field">
              <label>Confirmar senha</label>
              <div class="input-wrap">
                <input type="password" id="confirmaSenha" placeholder="Repita a senha" />
                <button class="eye-btn" onclick="toggleEye('confirmaSenha','eyeIcon2')" type="button">
                  <svg id="eyeIcon2" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
              </div>
              <span class="error-msg" id="confirmError">As senhas não coincidem.</span>
            </div>
            <button class="btn" id="btnStep3" onclick="handleStep3(event)">REDEFINIR SENHA</button>
          </div>`;

      } else if (step === 4) {
        container.innerHTML = `
          <div class="step" id="step" style="text-align:center">
            <div class="success-icon">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#7fff00" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline class="success-check" points="20 6 9 17 4 12"/>
              </svg>
            </div>
            <h2 class="success-title">SENHA<br><span>REDEFINIDA!</span></h2>
            <p class="success-desc">Sua senha foi alterada com sucesso.<br>Agora você já pode fazer login com a nova senha.</p>
            <a href="loginScreen.html" style="text-decoration:none">
              <button class="btn">IR PARA O LOGIN</button>
            </a>
          </div>`;
      }
    }

    function handleStep1(e) {
      const input = document.getElementById('emailInput');
      const error = document.getElementById('emailError');
      const val   = input.value.trim();
      const valid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val);

      if (!valid) {
        input.classList.add('error');
        error.classList.add('show');
        input.focus();
        return;
      }
      input.classList.remove('error');
      error.classList.remove('show');
      userEmail = val;

      ripple(document.getElementById('btnStep1'), e);
      transition(() => { currentStep = 2; render(2); });
    }

    function setupOTP() {
      const inputs = document.querySelectorAll('.otp-input');
      inputs.forEach((inp, i) => {
        inp.addEventListener('input', () => {
          inp.value = inp.value.replace(/\D/g, '').slice(0, 1);
          if (inp.value) {
            inp.classList.add('filled');
            if (i < inputs.length - 1) inputs[i + 1].focus();
          } else {
            inp.classList.remove('filled');
          }
        });
        inp.addEventListener('keydown', e => {
          if (e.key === 'Backspace' && !inp.value && i > 0) inputs[i - 1].focus();
          if (e.key === 'Enter') handleStep2({ clientX: 0, clientY: 0 });
        });
        inp.addEventListener('paste', e => {
          e.preventDefault();
          const paste = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '');
          [...paste].slice(0, 6).forEach((ch, j) => {
            if (inputs[i + j]) { inputs[i + j].value = ch; inputs[i + j].classList.add('filled'); }
          });
          const next = Math.min(i + paste.length, inputs.length - 1);
          inputs[next].focus();
        });
      });
      inputs[0].focus();
    }

    function startTimer() {
      clearInterval(timerInterval);
      let secs = 59;
      const btn   = document.getElementById('resendBtn');
      const timer = document.getElementById('timerDisplay');
      if (btn) btn.disabled = true;

      timerInterval = setInterval(() => {
        if (!document.getElementById('timerDisplay')) { clearInterval(timerInterval); return; }
        secs--;
        const m = String(Math.floor(secs / 60)).padStart(2, '0');
        const s = String(secs % 60).padStart(2, '0');
        if (timer) timer.textContent = `${m}:${s}`;
        if (secs <= 0) {
          clearInterval(timerInterval);
          if (btn)   { btn.disabled = false; }
          if (timer) { timer.textContent = ''; }
        }
      }, 1000);
    }

    function handleStep2(e) {
      const inputs  = document.querySelectorAll('.otp-input');
      const code    = [...inputs].map(i => i.value).join('');
      if (code.length < 6) {
        inputs.forEach(i => { if (!i.value) i.style.borderColor = '#ef4444'; });
        setTimeout(() => inputs.forEach(i => i.style.borderColor = ''), 1200);
        return;
      }
      clearInterval(timerInterval);
      ripple(document.getElementById('btnStep2'), e);
      transition(() => { currentStep = 3; render(3); });
    }

    function toggleEye(inputId, iconId) {
      const input = document.getElementById(inputId);
      const icon  = document.getElementById(iconId);
      const show  = input.type === 'text';
      input.type  = show ? 'password' : 'text';
      icon.innerHTML = show
        ? `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`
        : `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`;
    }

    function checkStrength(val) {
      const fill  = document.getElementById('strengthFill');
      const label = document.getElementById('strengthLabel');
      if (!fill) return;
      let score = 0;
      if (val.length >= 8)          score++;
      if (/[A-Z]/.test(val))        score++;
      if (/[0-9]/.test(val))        score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;
      const lvl = [
        { w: '0%',   c: 'transparent', t: '' },
        { w: '25%',  c: '#ef4444',     t: 'Fraca' },
        { w: '50%',  c: '#f97316',     t: 'Razoável' },
        { w: '75%',  c: '#eab308',     t: 'Boa' },
        { w: '100%', c: '#7fff00',     t: 'Forte ✓' },
      ];
      fill.style.width      = lvl[score].w;
      fill.style.background = lvl[score].c;
      label.textContent     = lvl[score].t;
    }

    function handleStep3(e) {
      const nova     = document.getElementById('novaSenha').value;
      const confirma = document.getElementById('confirmaSenha').value;
      const err      = document.getElementById('confirmError');

      if (nova.length < 8) {
        document.getElementById('novaSenha').focus();
        return;
      }
      if (nova !== confirma) {
        document.getElementById('confirmaSenha').classList.add('error');
        err.classList.add('show');
        return;
      }
      err.classList.remove('show');
      ripple(document.getElementById('btnStep3'), e);
      transition(() => { currentStep = 4; render(4); });
    }

    function transition(cb) {
      const step = document.getElementById('step');
      if (!step) { cb(); return; }
      step.classList.add('leaving');
      setTimeout(() => { cb(); }, 300);
    }

    function ripple(btn, e) {
      if (!btn) return;
      const rect = btn.getBoundingClientRect();
      const r    = document.createElement('span');
      r.className = 'ripple';
      const size  = Math.max(rect.width, rect.height);
      const x     = (e.clientX || rect.left + rect.width / 2)  - rect.left - size / 2;
      const y     = (e.clientY || rect.top  + rect.height / 2) - rect.top  - size / 2;
      r.style.cssText = `width:${size}px;height:${size}px;left:${x}px;top:${y}px`;
      btn.appendChild(r);
      r.addEventListener('animationend', () => r.remove());
    }

    render(1);
  </script>
</body>
</html>
