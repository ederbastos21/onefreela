<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OneFreela — Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script>(function(){document.documentElement.setAttribute("data-theme",localStorage.getItem("of_theme")||"dark");})()</script>
</head>
<body>

  <nav class="nav-app">
    <div class="nav-left">
      <a href="index.html" class="nav-logo">
        <div class="nav-logo-icon">OF</div>
        <div class="nav-logo-text">One<span>Freela</span></div>
      </a>
    </div>
    <div class="nav-right">
      <a href="cartScreen.html" class="nav-icon-btn" title="Carrinho">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      </a>
      <div class="nav-icon-btn" id="notifBtn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      </div>
      <a href="chatScreenClient.html" class="nav-icon-btn active-page" title="Mensagens">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </a>
      <div class="nav-user">
        <div class="nav-user-name" id="navUserName"></div>
        <div class="nav-user-role" id="navUserRole"></div>
      </div>
      <a href="profile.html" class="nav-avatar" id="navAvatar"></a>
      <a href="adminScreen.html" id="adminAreaBtn" class="nav-admin-btn">Área do admin</a>
    </div>
  </nav>

  <div class="notif-panel" id="notifPanel">
    <div class="notif-title">Notificações</div>
  </div>

  <div class="chat-wrap">

    <!-- LISTA DE CONVERSAS -->
    <div class="conv-sidebar">
      <div class="conv-header">
        <div class="conv-title">Mensagens</div>
        <div class="conv-search">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" placeholder="Buscar conversa..." id="convSearch" oninput="filterConvs()" />
        </div>
      </div>
      <div class="conv-list" id="convList"></div>
    </div>

    <!-- ÁREA DE MENSAGENS -->
    <div class="chat-area">

      <div class="chat-header">
        <div class="chat-header-left">
          <div class="chat-header-avatar" id="chatHeaderAvatar"></div>
          <div class="chat-header-info">
            <div class="chat-header-name" id="chatHeaderName">—</div>
            <div class="chat-header-status"><span class="chat-header-status-dot"></span><span id="chatHeaderStatus"></span></div>
          </div>
        </div>
        <div class="chat-header-right">
          <a href="profile.html#pedidos" class="chat-action-btn" title="Voltar para pedidos">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          </a>
        </div>
      </div>

      <div class="service-bar" id="serviceBar" style="display:none">
        <span class="service-bar-icon" id="svcBarIcon">📦</span>
        <div class="service-bar-info">
          <div class="service-bar-title" id="svcBarTitle">—</div>
          <div class="service-bar-sub" id="svcBarSub">—</div>
        </div>
        <div class="service-bar-price" id="svcBarPrice">—</div>
        <span class="service-bar-status" id="svcBarStatus">—</span>
      </div>

      <div class="chat-messages" id="chatMessages"></div>

      <div class="chat-input-area">
        <div class="chat-input-row">
          <button class="chat-input-attach" title="Anexar arquivo">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
          </button>
          <div class="chat-input-wrap">
            <textarea class="chat-textarea" id="msgInput" placeholder="Digite sua mensagem..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
          </div>
          <button class="chat-send" onclick="sendMsg()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
    </div>

    <!-- PAINEL DE INFO -->
    <div class="info-panel">
      <div class="info-section">
        <div class="info-section-title">Freelancer</div>
        <div class="fl-profile-mini">
          <div class="fl-profile-avatar" id="infoPanelAvatar"></div>
          <div class="fl-profile-name" id="infoPanelName">—</div>
          <div class="fl-profile-role" id="infoPanelRole"></div>
        </div>
      </div>

      <div class="info-section" id="actionsSection" style="display:none">
        <div class="info-section-title">Ações</div>
        <div id="actionButtons"></div>
      </div>
    </div>

  </div>

  <script src="auth.js"></script>
  <script src="main.js"></script>
  <script src="chatScreenClient.js"></script>
</body>
</html>
