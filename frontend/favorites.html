<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OneFreela — Meus Favoritos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav class="nav-app">
    <div class="nav-left">
      <a href="index.html" class="nav-logo">
        <div class="nav-logo-icon">OF</div>
        <div class="nav-logo-text">One<span>Freela</span></div>
      </a>
      <div class="nav-sep"></div>
      <a href="exploreFreelancers.html" class="nav-back">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg>
        Explorar serviços
      </a>
    </div>
    <div class="nav-right">
      <a href="cartScreen.html" class="nav-icon-btn" title="Carrinho">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      </a>
      <a href="favorites.html" class="nav-icon-btn active-page" id="navFavoritesLink" title="Favoritos" style="display:none">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      </a>
      <div class="nav-icon-btn" id="notifBtn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      </div>
      <div class="nav-icon-btn" title="Mensagens" onclick="goToChat()" style="cursor:pointer">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </div>
      <div class="nav-user">
        <div class="nav-user-name" id="navUserName"></div>
        <div class="nav-user-role" id="navUserRole"></div>
      </div>
      <a href="profile.html" class="nav-avatar" id="navAvatar"></a>
      <button id="navNovoServico" class="nav-new-service-btn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Novo Serviço
      </button>
      <a href="adminScreen.html" id="adminAreaBtn" class="nav-admin-btn">Área do admin</a>
    </div>
  </nav>

  <div class="notif-panel" id="notifPanel">
    <div class="notif-title">Notificações</div>
  </div>

  <div class="app-page">
    <div class="container">
      <div class="section-header" style="margin-bottom:24px">
        <h1 class="section-title" style="font-size:22px;font-weight:700">Meus Favoritos</h1>
      </div>

      <div class="fl-grid" id="favGrid"></div>

      <div class="empty" id="emptyState" style="display:none">
        <div class="empty-icon">♥</div>
        <div class="empty-title">Nenhum favorito ainda</div>
        <div class="empty-desc">Explore os serviços e marque os que mais gostar.</div>
        <a href="exploreFreelancers.html" class="btn-buy" style="display:inline-block;margin-top:16px;text-decoration:none">EXPLORAR SERVIÇOS</a>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="auth.js"></script>
  <script src="main.js"></script>
  <script src="favorites.js"></script>
</body>
</html>
